services:
  - type: web
    name: aegis-security
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt && python init_db.py && python model/train.py
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    healthCheckPath: /healthz
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: AEGIS_AUTO_BOOTSTRAP
        value: "1"
